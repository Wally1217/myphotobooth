<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>橘子巨嬰人生四格</title>
    <style>
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background: #1a1a1a; color: white; margin: 0; padding: 20px; 
        }
        
        h1 { margin-bottom: 10px; color: #00D1B2; }

        /* 預覽容器：不再寫死比例，由內部 canvas 決定 */
        .preview-container { 
            position: relative; 
            width: 95vw; 
            max-width: 800px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            line-height: 0;
        }

        /* 隱藏原始視訊，只作為數據源 */
        #video { 
            position: absolute; width: 1px; height: 1px; opacity: 0; 
        }

        /* 這是我們真正看到的預覽畫面 */
        #preview-canvas { 
            width: 100%; 
            height: auto; 
            display: block;
        }

        /* 倒數計時 */
        #countdown-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: 900;
            color: #00D1B2;
            text-shadow: 0 0 30px rgba(0,0,0,0.8);
            z-index: 100;
            display: none;
            pointer-events: none;
        }

        /* 閃光燈特效 */
        #flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 150;
            opacity: 0;
            pointer-events: none;
        }

        .controls { margin-top: 30px; }
        button { 
            padding: 15px 50px; font-size: 1.2rem; cursor: pointer; 
            border-radius: 50px; border: none; background: #00D1B2; color: white;
            transition: 0.3s; font-weight: bold; box-shadow: 0 4px 15px rgba(0,209,178,0.3);
        }
        button:hover { transform: scale(1.05); background: #00b89c; }
        button:disabled { background: #555; cursor: not-allowed; box-shadow: none; }

        #result-container { margin-top: 40px; display: none; text-align: center; padding-bottom: 50px; }
        #final-canvas { 
            max-width: 320px; 
            height: auto;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .download-hint { margin-top: 15px; color: #aaa; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>🍊 橘子巨嬰人生四格 🍊</h1>
    
    <div class="preview-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="preview-canvas"></canvas>
        <div id="countdown-text">3</div>
        <div id="flash"></div>
    </div>

    <div class="controls">
        <button id="start-btn">開始自動連拍</button>
        <button id="reset-btn" style="background:#444; display:none; margin-left:10px;">重新拍攝</button>
    </div>

    <div id="result-container">
        <canvas id="final-canvas"></canvas>
        <p class="download-hint">✨ 長按圖片或右鍵即可儲存成品 ✨</p>
    </div>

    <script>
        const video = document.getElementById('video');
        const previewCanvas = document.getElementById('preview-canvas');
        const ctx = previewCanvas.getContext('2d');
        const countdownEl = document.getElementById('countdown-text');
        const flashEl = document.getElementById('flash');
        const startBtn = document.getElementById('start-btn');
        const finalCanvas = document.getElementById('final-canvas');
        
        let currentStep = 1;
        const capturedImages = [];
        const frames = [];
        const frameSrcs = ['frame1.png', 'frame2.png', 'frame3.png', 'frame4.png'];

        // 預載入圖框
        frameSrcs.forEach(src => {
            const img = new Image();
            img.src = src;
            frames.push(img);
        });

        // 初始化鏡頭
        navigator.mediaDevices.getUserMedia({ 
            video: { 
                width: { ideal: 1280 }, 
                height: { ideal: 960 },
                facingMode: "user" 
            } 
        })
        .then(stream => { 
            video.srcObject = stream;
            // 當鏡頭數據載入後，根據實際比例調整畫布大小
            video.onloadedmetadata = () => {
                const videoW = video.videoWidth;
                const videoH = video.videoHeight;
                const ratio = videoW / videoH;
                
                // 以 800 為基準寬度，動態計算高度
                previewCanvas.width = 800;
                previewCanvas.height = 800 / ratio;
                
                drawPreview();
            };
        })
        .catch(err => {
            console.error(err);
            alert("無法存取相機，請確認權限設定。");
        });

        // 即時繪製預覽（包含鏡像與圖框）
        function drawPreview() {
            ctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
            
            // 畫底層鏡像人臉
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -previewCanvas.width, 0, previewCanvas.width, previewCanvas.height);
            ctx.restore();
            
            // 畫上層當前圖框
            let frameIdx = Math.min(currentStep - 1, 3);
            if (frames[frameIdx] && frames[frameIdx].complete) {
                ctx.drawImage(frames[frameIdx], 0, 0, previewCanvas.width, previewCanvas.height);
            }
            requestAnimationFrame(drawPreview);
        }

        function triggerFlash() {
            flashEl.style.opacity = '1';
            setTimeout(() => {
                flashEl.style.transition = 'opacity 0.5s';
                flashEl.style.opacity = '0';
                setTimeout(() => { flashEl.style.transition = 'none'; }, 500);
            }, 50);
        }

        startBtn.onclick = async () => {
            startBtn.disabled = true;
            capturedImages.length = 0;

            for (let i = 1; i <= 4; i++) {
                currentStep = i;
                await runCountdown(3);
                triggerFlash();
                capturePhoto();
            }
            
            generateFinalStrip();
        };

        function runCountdown(seconds) {
            return new Promise(resolve => {
                let count = seconds;
                countdownEl.style.display = 'block';
                countdownEl.innerText = count;
                const timer = setInterval(() => {
                    count--;
                    if (count > 0) countdownEl.innerText = count;
                    else { clearInterval(timer); countdownEl.style.display = 'none'; resolve(); }
                }, 1000);
            });
        }

        function capturePhoto() {
            const tempCanvas = document.createElement('canvas');
            // 存檔尺寸必須跟當時的預覽尺寸一致
            tempCanvas.width = previewCanvas.width;
            tempCanvas.height = previewCanvas.height;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.drawImage(previewCanvas, 0, 0);
            capturedImages.push(tempCanvas);
        }

        function generateFinalStrip() {
            const fCtx = finalCanvas.getContext('2d');
            const imgW = previewCanvas.width;
            const imgH = previewCanvas.height;

            // 無縫拼接：寬度與單張相同，高度為單張高度 * 4
            finalCanvas.width = imgW;
            finalCanvas.height = imgH * 4;

            capturedImages.forEach((img, index) => {
                fCtx.drawImage(img, 0, index * imgH, imgW, imgH);
            });

            document.getElementById('result-container').style.display = 'block';
            document.getElementById('reset-btn').style.display = 'inline-block';
            startBtn.style.display = 'none';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        document.getElementById('reset-btn').onclick = () => location.reload();
    </script>
</body>
</html>
