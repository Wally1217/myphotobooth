<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>橘子巨嬰人生四格</title>
    <style>
        :root { --frame-width: 800px; --frame-height: 600px; }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background: #1a1a1a; color: white; margin: 0; padding: 20px; 
            overflow-x: hidden;
        }
        
        h1 { margin-bottom: 10px; color: #00D1B2; text-align: center; }

        /* 預覽容器：維持 4:3 比例 */
        .preview-container { 
            position: relative; 
            width: 100%; 
            max-width: 500px; /* 手機顯示寬度 */
            aspect-ratio: 4 / 3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* 隱藏原始 video，改用 canvas 顯示即時畫面 */
        video { display: none; }
        #preview-canvas { 
            width: 100%; height: 100%; 
            object-fit: cover; 
        }

        #countdown-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: 900;
            color: #00D1B2;
            text-shadow: 0 0 30px rgba(0,0,0,0.8);
            z-index: 100;
            display: none;
        }

        #flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 150;
            opacity: 0;
            pointer-events: none;
        }

        .controls { margin-top: 30px; text-align: center; }
        button { 
            padding: 15px 40px; font-size: 1.1rem; cursor: pointer; 
            border-radius: 50px; border: none; background: #00D1B2; color: white;
            transition: 0.3s; font-weight: bold; box-shadow: 0 4px 15px rgba(0,209,178,0.3);
        }
        button:hover { transform: scale(1.05); }
        button:disabled { background: #555; cursor: not-allowed; box-shadow: none; opacity: 0.7; }

        #result-container { margin-top: 40px; display: none; text-align: center; padding-bottom: 50px; }
        #final-canvas { 
            max-width: 300px; /* 呈現拍貼機長條感 */
            height: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .download-hint { margin-top: 15px; color: #aaa; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>🍊 橘子巨嬰人生四格 🍊</h1>
    
    <div class="preview-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="preview-canvas" width="800" height="600"></canvas>
        <div id="countdown-text">3</div>
        <div id="flash"></div>
    </div>

    <div class="controls">
        <button id="start-btn" disabled>資源載入中...</button>
        <button id="reset-btn" style="background:#444; display:none; margin-top:10px;">重新拍攝</button>
    </div>

    <div id="result-container">
        <canvas id="final-canvas"></canvas>
        <p class="download-hint">✨ 長按圖片或右鍵即可儲存成品 ✨</p>
    </div>

    <script>
        const video = document.getElementById('video');
        const previewCanvas = document.getElementById('preview-canvas');
        const ctx = previewCanvas.getContext('2d');
        const countdownEl = document.getElementById('countdown-text');
        const flashEl = document.getElementById('flash');
        const startBtn = document.getElementById('start-btn');
        const finalCanvas = document.getElementById('final-canvas');
        
        let currentStep = 1;
        const capturedImages = [];
        const frames = [];
        const frameSrcs = ['frame1.png', 'frame2.png', 'frame3.png', 'frame4.png'];

        // 1. 預載入圖框並監測狀態
        let loadedFrames = 0;
        frameSrcs.forEach((src, index) => {
            const img = new Image();
            img.onload = () => {
                loadedFrames++;
                if (loadedFrames === 4) {
                    startBtn.disabled = false;
                    startBtn.innerText = "開始自動連拍";
                }
            };
            img.onerror = () => {
                console.error(`無法載入圖框: ${src}`);
            };
            img.src = src;
            frames[index] = img;
        });

        // 2. 初始化鏡頭 (請求較高解析度以供裁切)
        navigator.mediaDevices.getUserMedia({ 
            video: { 
                width: { ideal: 1280 }, 
                height: { ideal: 960 },
                facingMode: "user" 
            } 
        })
        .then(stream => { video.srcObject = stream; })
        .catch(err => {
            alert("無法存取相機，請確保已開啟權限並使用 HTTPS 連線。");
        });

        // 3. 通用繪製邏輯：負責把 video 漂亮地畫進 800x600 的 canvas
        function drawVideoToCanvas(targetCtx, withFrame = true) {
            const targetW = 800;
            const targetH = 600;

            // 清除畫布
            targetCtx.clearRect(0, 0, targetW, targetH);

            // 計算裁切：使其填滿 4:3 區域 (Crop to Fill)
            const vW = video.videoWidth;
            const vH = video.videoHeight;
            if (!vW || !vH) return;

            const targetAspect = targetW / targetH;
            const videoAspect = vW / vH;
            let sx, sy, sWidth, sHeight;

            if (videoAspect > targetAspect) {
                sHeight = vH;
                sWidth = vH * targetAspect;
                sx = (vW - sWidth) / 2;
                sy = 0;
            } else {
                sWidth = vW;
                sHeight = vW / targetAspect;
                sx = 0;
                sy = (vH - sHeight) / 2;
            }

            // 繪製人像：鏡像處理
            targetCtx.save();
            targetCtx.translate(targetW, 0);
            targetCtx.scale(-1, 1);
            targetCtx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, targetW, targetH);
            targetCtx.restore();

            // 繪製圖框：不鏡像處理
            if (withFrame) {
                let frameIdx = Math.min(currentStep - 1, 3);
                if (frames[frameIdx] && frames[frameIdx].complete) {
                    targetCtx.drawImage(frames[frameIdx], 0, 0, targetW, targetH);
                }
            }
        }

        // 即時預覽迴圈
        function updatePreview() {
            drawVideoToCanvas(ctx, true);
            requestAnimationFrame(updatePreview);
        }
        video.onloadedmetadata = () => updatePreview();

        // 4. 拍照邏輯
        function capturePhoto() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 800;
            tempCanvas.height = 600;
            const tCtx = tempCanvas.getContext('2d');
            
            // 抓取當前瞬間
            drawVideoToCanvas(tCtx, true);
            capturedImages.push(tempCanvas);
        }

        // 5. 自動流程
        startBtn.onclick = async () => {
            startBtn.disabled = true;
            capturedImages.length = 0;

            for (let i = 1; i <= 4; i++) {
                currentStep = i;
                await runCountdown(3);
                triggerFlash();
                capturePhoto();
            }
            
            generateFinalStrip();
        };

        function runCountdown(seconds) {
            return new Promise(resolve => {
                let count = seconds;
                countdownEl.style.display = 'block';
                countdownEl.innerText = count;
                const timer = setInterval(() => {
                    count--;
                    if (count > 0) {
                        countdownEl.innerText = count;
                    } else {
                        clearInterval(timer);
                        countdownEl.style.display = 'none';
                        resolve();
                    }
                }, 1000);
            });
        }

        function triggerFlash() {
            flashEl.style.transition = 'none';
            flashEl.style.opacity = '1';
            setTimeout(() => {
                flashEl.style.transition = 'opacity 0.6s';
                flashEl.style.opacity = '0';
            }, 50);
        }

        function generateFinalStrip() {
            const fCtx = finalCanvas.getContext('2d');
            const imgW = 800;
            const imgH = 600;

            finalCanvas.width = imgW;
            finalCanvas.height = imgH * 4;

            capturedImages.forEach((canvas, index) => {
                fCtx.drawImage(canvas, 0, index * imgH, imgW, imgH);
            });

            document.getElementById('result-container').style.display = 'block';
            document.getElementById('reset-btn').style.display = 'inline-block';
            startBtn.style.display = 'none';
            
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        document.getElementById('reset-btn').onclick = () => location.reload();
    </script>
</body>
</html>
